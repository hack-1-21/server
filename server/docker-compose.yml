services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: soundreal
      POSTGRES_PASSWORD: soundreal
      POSTGRES_DB: soundreal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soundreal"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://soundreal:soundreal@postgres:5432/soundreal?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
