openapi: 3.0.3
info:
  title: SoundReal API
  version: 1.0.0
  description: |
    街の環境音（dB）と位置情報を収集・共有する感覚同期型SNSマップ **SoundReal** のバックエンドAPI。
    
    - WearOS デバイスが計測した dB / Hz / 位置情報を保存する
    - React Native アプリがヒートマップ描画用にデータを取得する
    - Sound Check-In（BeReal 風）とエリアマスター機能を提供する

servers:
  - url: http://localhost:8080
    description: ローカル開発サーバー

tags:
  - name: health
    description: サーバー疎通確認
  - name: measurements
    description: 環境音測定データの登録・取得
  - name: auth
    description: ユーザー認証（JWT）
  - name: users
    description: ユーザープロフィールと設定
  - name: device
    description: WearOS デバイス連携

paths:
  /health:
    get:
      summary: ヘルスチェック
      tags: [health]
      operationId: getHealth
      responses:
        "200":
          description: サーバー正常稼働
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /auth/register:
    post:
      summary: 新規登録
      description: メールアドレスとパスワードでアカウントを作成し、JWTトークンを返す。
      tags: [auth]
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: メールアドレスまたはユーザーIDが既に存在する
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/login:
    post:
      summary: ログイン
      description: メールアドレスとパスワードでログインし、JWTトークンを返す。
      tags: [auth]
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: ログイン成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: 認証失敗（メールアドレスまたはパスワード間違い）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/google:
    post:
      summary: Googleログイン
      description: |
        フロントエンド（React Native/Expo）で取得したGoogleの `id_token` を送信して認証する。
        検証に成功すれば、独自JWTトークンとユーザー情報を返す。
      tags: [auth]
      operationId: googleLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoogleLoginRequest"
      responses:
        "200":
          description: ログイン/登録成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: 無効な Google トークン
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /device/start-link:
    post:
      summary: デバイス連携開始
      description: WearOS デバイス用の device_id と短いペアリングコードを発行する。
      tags: [device]
      operationId: startDeviceLink
      responses:
        "201":
          description: ペアリングコード発行成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartDeviceLinkResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /device/complete-link:
    post:
      summary: デバイス連携完了
      description: ログイン済みユーザーがペアリングコードを入力し、デバイスとユーザーを紐づける。
      tags: [device]
      operationId: completeDeviceLink
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteDeviceLinkRequest"
            example:
              code: "ABCD-1234"
      responses:
        "200":
          description: 連携成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: linked
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /device/poll-link:
    post:
      summary: デバイス連携状態取得
      description: WearOS デバイスが定期的に呼び、連携完了後に device_token を受け取る。
      tags: [device]
      operationId: pollDeviceLink
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PollDeviceLinkRequest"
            example:
              device_id: "device_abc123"
      responses:
        "200":
          description: 連携状態
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PollDeviceLinkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /device/links:
    get:
      summary: 連携デバイス一覧
      description: ログイン済みユーザーに紐づく WearOS デバイス一覧を取得する。
      tags: [device]
      operationId: getLinkedDevices
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 連携デバイス一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LinkedDevice"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /device/links/{device_id}:
    delete:
      summary: 連携デバイス削除
      description: ログイン済みユーザーに紐づく指定デバイスの連携を削除する。削除後、その device_token は無効になる。
      tags: [device]
      operationId: deleteLinkedDevice
      security:
        - bearerAuth: []
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
            example: "device_abc123"
      responses:
        "200":
          description: 削除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: unlinked
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /device/unlink:
    delete:
      summary: 現在のデバイス連携削除
      description: WearOS デバイスが自身の device_token で自分の連携を削除する。削除後、その device_token は無効になる。
      tags: [device]
      operationId: unlinkCurrentDevice
      security:
        - deviceBearerAuth: []
      responses:
        "200":
          description: 削除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: unlinked
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /users/{user_id}:
    get:
      summary: ユーザー情報取得
      description: ユーザーのプロフィールと設定を取得する（存在しない場合は自動作成）。
      tags: [users]
      operationId: getUser
      parameters:
        - name: user_id
          in: path
          required: true
          description: ユーザーID
          schema:
            type: string
            example: "user-abc123"
      responses:
        "200":
          description: ユーザー情報
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "500":
          $ref: "#/components/responses/InternalError"
    put:
      summary: ユーザー情報更新
      description: ユーザーのプロフィールや設定を更新する。
      tags: [users]
      operationId: updateUser
      parameters:
        - name: user_id
          in: path
          required: true
          description: ユーザーID
          schema:
            type: string
            example: "user-abc123"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
            example:
              nickname: "SoundMaster"
              alert_enabled: false
              theme: "dark"
      responses:
        "200":
          description: 更新後のユーザー情報
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /measurements:
    post:
      summary: 音データ投稿
      description: WearOS デバイスから dB・Hz・位置情報を受け取り、device_token に紐づく user_id で保存する。
      tags: [measurements]
      operationId: createMeasurement
      security:
        - deviceBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMeasurementRequest"
            example:
              db: 65.5
              hz: 440.0
              latitude: 35.6812
              longitude: 139.7671
      responses:
        "201":
          description: 保存成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

    get:
      summary: 測定データ一覧
      description: 測定データを全件または差分（after_id以降）で取得する。
      tags: [measurements]
      operationId: getMeasurements
      parameters:
        - name: after_id
          in: query
          required: false
          description: 指定したIDより大きい（新しい）データのみを取得する。
          schema:
            type: integer
            example: 100
      responses:
        "200":
          description: 測定データ一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Measurement"
        "500":
          $ref: "#/components/responses/InternalError"

  /measurements/bbox:
    get:
      summary: バウンディングボックス内の測定データ
      description: |
        指定した北東（NE）と南西（SW）の座標内に含まれるすべての測定データを返す。
        ユーザーIDを指定すると、そのユーザーのデータのみに絞り込むことができる。
      tags: [measurements]
      operationId: getMeasurementsBBox
      parameters:
        - name: ne_lat
          in: query
          required: true
          description: 北東の緯度
          schema:
            type: number
            format: double
            example: 35.6812
        - name: ne_lng
          in: query
          required: true
          description: 北東の経度
          schema:
            type: number
            format: double
            example: 139.7671
        - name: sw_lat
          in: query
          required: true
          description: 南西の緯度
          schema:
            type: number
            format: double
            example: 35.6580
        - name: sw_lng
          in: query
          required: true
          description: 南西の経度
          schema:
            type: number
            format: double
            example: 139.7016
        - name: user_id
          in: query
          required: false
          description: 指定するとそのユーザーのデータのみに絞り込む（自分の集めたデータのみ表示する場合などに使用）
          schema:
            type: string
            example: "user-abc123"
      responses:
        "200":
          description: 測定データ一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Measurement"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    deviceBearerAuth:
      type: http
      scheme: bearer
      description: WearOS に発行された device_token

  schemas:
    User:
      type: object
      properties:
        user_id:
          type: string
          example: "user-abc123"
        email:
          type: string
          format: email
          example: "user@example.com"
        nickname:
          type: string
          example: "SoundMaster"
        level:
          type: integer
          example: 5
        exp:
          type: integer
          example: 1250
        points:
          type: integer
          example: 300
        alert_enabled:
          type: boolean
          example: true
        theme:
          type: string
          example: "light"
        created_at:
          type: string
          format: date-time
          example: "2026-04-28T09:00:00Z"

    RegisterRequest:
      type: object
      required: [email, nickname, password]
      properties:
        user_id:
          type: string
          description: 省略した場合はサーバー側で生成される
          example: "user-abc123"
        email:
          type: string
          format: email
          example: "user@example.com"
        nickname:
          type: string
          example: "SoundMaster"
        password:
          type: string
          example: "secretpassword"

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        password:
          type: string
          example: "secretpassword"

    GoogleLoginRequest:
      type: object
      required: [id_token]
      properties:
        id_token:
          type: string
          description: Googleログインで取得したIDトークン
          example: "eyJhbGciOiJSUzI1NiIsImtpZCI6..."

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        user:
          $ref: "#/components/schemas/User"

    StartDeviceLinkResponse:
      type: object
      properties:
        device_id:
          type: string
          example: "device_abc123"
        pairing_code:
          type: string
          example: "ABCD-1234"
        expires_in_seconds:
          type: integer
          example: 600

    CompleteDeviceLinkRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          example: "ABCD-1234"

    PollDeviceLinkRequest:
      type: object
      required: [device_id]
      properties:
        device_id:
          type: string
          example: "device_abc123"

    PollDeviceLinkResponse:
      type: object
      properties:
        status:
          type: string
          enum: [pending, linked, expired]
          example: linked
        device_token:
          type: string
          example: "dt_abc123"

    LinkedDevice:
      type: object
      properties:
        device_id:
          type: string
          example: "device_abc123"
        linked_at:
          type: string
          format: date-time
          example: "2026-05-04T10:31:00Z"
        last_used_at:
          type: string
          format: date-time
          nullable: true
          example: "2026-05-04T10:35:00Z"

    UpdateUserRequest:
      type: object
      properties:
        nickname:
          type: string
          example: "SoundMaster"
        alert_enabled:
          type: boolean
          example: false
        theme:
          type: string
          example: "dark"
    Measurement:
      type: object
      properties:
        id:
          type: integer
          example: 1
        user_id:
          type: string
          example: "user-abc123"
        db:
          type: number
          format: double
          description: 音量（デシベル）
          example: 65.5
        hz:
          type: number
          format: double
          description: 周波数（ヘルツ）
          example: 440.0
        latitude:
          type: number
          format: double
          example: 35.6812
        longitude:
          type: number
          format: double
          example: 139.7671
        created_at:
          type: string
          format: date-time
          example: "2026-04-28T09:00:00Z"

    CreateMeasurementRequest:
      type: object
      required: [db, hz, latitude, longitude]
      properties:
        db:
          type: number
          format: double
          example: 65.5
        hz:
          type: number
          format: double
          example: 440.0
        latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
          example: 35.6812
        longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180
          example: 139.7671

    CreatedResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        message:
          type: string
          example: ok

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "リクエストのJSON形式が不正です"

  responses:
    BadRequest:
      description: リクエストパラメータが不正
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: データが存在しない
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: 認証に失敗
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: サーバー内部エラー
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
