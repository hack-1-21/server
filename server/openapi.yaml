openapi: 3.0.3
info:
  title: SoundReal API
  version: 1.0.0
  description: |
    街の環境音（dB）と位置情報を収集・共有する感覚同期型SNSマップ **SoundReal** のバックエンドAPI。
    
    - WearOS デバイスが計測した dB / Hz / 位置情報を保存する
    - React Native アプリがヒートマップ描画用にデータを取得する
    - Sound Check-In（BeReal 風）とエリアマスター機能を提供する

servers:
  - url: http://localhost:8080
    description: ローカル開発サーバー

tags:
  - name: health
    description: サーバー疎通確認
  - name: measurements
    description: 環境音測定データの登録・取得
  - name: users
    description: ユーザープロフィールと設定

paths:
  /health:
    get:
      summary: ヘルスチェック
      tags: [health]
      operationId: getHealth
      responses:
        "200":
          description: サーバー正常稼働
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /users/{user_id}:
    get:
      summary: ユーザー情報取得
      description: ユーザーのプロフィールと設定を取得する（存在しない場合は自動作成）。
      tags: [users]
      operationId: getUser
      parameters:
        - name: user_id
          in: path
          required: true
          description: ユーザーID
          schema:
            type: string
            example: "user-abc123"
      responses:
        "200":
          description: ユーザー情報
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "500":
          $ref: "#/components/responses/InternalError"
    put:
      summary: ユーザー情報更新
      description: ユーザーのプロフィールや設定を更新する。
      tags: [users]
      operationId: updateUser
      parameters:
        - name: user_id
          in: path
          required: true
          description: ユーザーID
          schema:
            type: string
            example: "user-abc123"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
            example:
              nickname: "SoundMaster"
              alert_enabled: false
              theme: "dark"
      responses:
        "200":
          description: 更新後のユーザー情報
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /measurements:
    post:
      summary: 音データ投稿
      description: WearOS デバイスから dB・Hz・位置情報を受け取り保存する。
      tags: [measurements]
      operationId: createMeasurement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMeasurementRequest"
            example:
              user_id: "user-abc123"
              db: 65.5
              hz: 440.0
              latitude: 35.6812
              longitude: 139.7671
      responses:
        "201":
          description: 保存成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

    get:
      summary: 測定データ一覧
      description: 測定データを全件または差分（after_id以降）で取得する。
      tags: [measurements]
      operationId: getMeasurements
      parameters:
        - name: after_id
          in: query
          required: false
          description: 指定したIDより大きい（新しい）データのみを取得する。
          schema:
            type: integer
            example: 100
      responses:
        "200":
          description: 測定データ一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Measurement"
        "500":
          $ref: "#/components/responses/InternalError"

  /measurements/area:
    get:
      summary: エリア内測定データ（ヒートマップ用）
      description: |
        指定した緯度経度を中心とした半径 N km 圏内の測定値を集計して返す。
        同一座標の測定値は平均 dB とカウントに集約されるため、
        React Native 側でそのままヒートマップのウェイトとして利用できる。
      tags: [measurements]
      operationId: getMeasurementsArea
      parameters:
        - name: lat
          in: query
          required: true
          description: 中心緯度（-90〜90）
          schema:
            type: number
            format: double
            example: 35.6812
        - name: lng
          in: query
          required: true
          description: 中心経度（-180〜180）
          schema:
            type: number
            format: double
            example: 139.7671
        - name: radius
          in: query
          required: false
          description: 検索半径（km）。デフォルト 1.0、最大 50.0
          schema:
            type: number
            format: double
            default: 1.0
            example: 0.5
        - name: user_id
          in: query
          required: false
          description: 指定するとそのユーザーのデータのみに絞り込む（自分の集めたデータのみ表示する場合などに使用）
          schema:
            type: string
            example: "user-abc123"
      responses:
        "200":
          description: ヒートマップポイント一覧
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AreaResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  schemas:
    User:
      type: object
      properties:
        user_id:
          type: string
          example: "user-abc123"
        nickname:
          type: string
          example: "SoundMaster"
        level:
          type: integer
          example: 5
        exp:
          type: integer
          example: 1250
        points:
          type: integer
          example: 300
        alert_enabled:
          type: boolean
          example: true
        theme:
          type: string
          example: "light"
        created_at:
          type: string
          format: date-time
          example: "2026-04-28T09:00:00Z"

    UpdateUserRequest:
      type: object
      properties:
        nickname:
          type: string
          example: "SoundMaster"
        alert_enabled:
          type: boolean
          example: false
        theme:
          type: string
          example: "dark"
    Measurement:
      type: object
      properties:
        id:
          type: integer
          example: 1
        user_id:
          type: string
          example: "user-abc123"
        db:
          type: number
          format: double
          description: 音量（デシベル）
          example: 65.5
        hz:
          type: number
          format: double
          description: 周波数（ヘルツ）
          example: 440.0
        latitude:
          type: number
          format: double
          example: 35.6812
        longitude:
          type: number
          format: double
          example: 139.7671
        created_at:
          type: string
          format: date-time
          example: "2026-04-28T09:00:00Z"

    CreateMeasurementRequest:
      type: object
      required: [db, hz, latitude, longitude]
      properties:
        user_id:
          type: string
          example: "user-abc123"
        db:
          type: number
          format: double
          example: 65.5
        hz:
          type: number
          format: double
          example: 440.0
        latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
          example: 35.6812
        longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180
          example: 139.7671

    HeatmapPoint:
      type: object
      properties:
        latitude:
          type: number
          format: double
          example: 35.6812
        longitude:
          type: number
          format: double
          example: 139.7671
        avg_db:
          type: number
          format: double
          description: エリア内の平均 dB
          example: 68.3
        count:
          type: integer
          description: 同座標の測定件数
          example: 5

    AreaResponse:
      type: object
      properties:
        center:
          type: object
          properties:
            lat:
              type: number
              format: double
              example: 35.6812
            lng:
              type: number
              format: double
              example: 139.7671
        radius_km:
          type: number
          format: double
          example: 1.0
        count:
          type: integer
          description: 返却ポイント数
          example: 42
        points:
          type: array
          items:
            $ref: "#/components/schemas/HeatmapPoint"

    CreatedResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        message:
          type: string
          example: ok

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "リクエストのJSON形式が不正です"

  responses:
    BadRequest:
      description: リクエストパラメータが不正
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: データが存在しない
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: サーバー内部エラー
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
